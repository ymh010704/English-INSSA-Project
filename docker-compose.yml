services:
  mysql:
    image: mysql:8
    restart: always
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d

  # 프론트엔드 서비스 추가
  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app            # 현재 폴더(src, public 포함)를 동기화
      - /app/node_modules # 호스트의 node_modules가 컨테이너를 덮어쓰지 않게 보호
    env_file: .env
    command: sh -c "npm install && npm run dev" # Vite 개발 서버 실행
    expose:
      - "5173"

  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      GROQ_API_KEY: ${GROQ_API_KEY}
    command: sh -c "npm install && node src/server.js"
    expose:
      - "3000"
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # - ./dist:/usr/share/nginx/html  <-- 개발 중에는 이 줄을 주석 처리하거나 삭제하세요!
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  mysql_data: