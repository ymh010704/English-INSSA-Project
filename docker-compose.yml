services:
  mysql:
    image: mysql:8
    restart: always
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 프론트엔드 서비스 추가
  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app # 현재 폴더(src, public 포함)를 동기화
      - /app/node_modules # 호스트의 node_modules가 컨테이너를 덮어쓰지 않게 보호
    env_file: .env
    command: sh -c "npm install && npm run dev" # Vite 개발 서버 실행
    expose:
      - "5173"

  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    command: sh -c "npm install && node src/server.js"
      - mysql

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # - ./dist:/usr/share/nginx/html  <-- 개발 중에는 이 줄을 주석 처리하거나 삭제하세요!
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

  # [slang-shorts 추가] 슬랭 쇼츠 자동 제작 파이프라인 서비스
  # 실행: docker compose --profile shorts up slang-shorts
  # 조건: .env에 GCP_PROJECT_ID, GCS_BUCKET_NAME, GCP_KEY_PATH 필요
  slang-shorts:
    build:
      context: ./slang-shorts
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      BATCH_SIZE: ${SHORTS_BATCH_SIZE:-3}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-key.json
    volumes:
      - ./gcp-key.json:/app/gcp-key.json:ro
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - shorts  # 기본 up 시 자동 시작 안 됨, --profile shorts 로만 실행

volumes:
  mysql_data:
